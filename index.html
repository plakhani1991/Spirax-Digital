<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Field Asset Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="header-content">
            <h1>Spirax Drive</h1>
            <div class="header-actions">
                <button id="btn-sync" class="badge-btn" style="display:none;">Sync <span>!</span></button>
                <button id="btn-logout" class="icon-btn">Logout</button>
            </div>
        </div>
    </header>

    <main id="app-container">
        <section id="view-login" class="view active">
            <div class="login-card">
                <div class="logo-area">🏢</div>
                <h2>Welcome Back</h2>
                <p>Please sign in to continue</p>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address">
                    <input type="password" id="password" placeholder="Password">
                </div>
                <button id="btn-login" class="primary-btn">Sign In</button>
            </div>
        </section>

        <section id="view-sites" class="view">
            <div class="section-header">
                <h2>Project Sites</h2>
                <p>Select a site or create a new one</p>
            </div>
            
            <div class="form-card">
                <h3>New Site</h3>
                <div class="input-row">
                    <input type="text" id="site-name" placeholder="Site Name">
                    <input type="text" id="site-city" placeholder="City">
                </div>
                <button id="btn-create-site" class="secondary-btn">+ Create Site</button>
            </div>

            <div class="list-container">
                <h3>Existing Sites</h3>
                <ul id="site-list" class="styled-list"></ul>
            </div>
        </section>

        <section id="view-plants" class="view">
            <button id="btn-back-sites" class="back-link">← Back to Sites</button>
            <div class="section-header">
                <h2 id="current-site-title">Plants</h2>
                <p>Manage plant locations</p>
            </div>

            <div class="form-card">
                <input type="text" id="plant-name" placeholder="Plant Name (e.g. Boiler House)">
                <input type="text" id="plant-desc" placeholder="Location Description">
                <button id="btn-add-plant" class="secondary-btn">Add Plant to Gallery</button>
            </div>

            <div id="plant-gallery" class="gallery-grid">
                </div>
        </section>

        <section id="view-assets" class="view">
            <button id="btn-back-plants" class="back-link">← Back to Plants</button>
            
            <div class="sticky-search">
                <input type="text" id="search-assets" placeholder="🔍 Search assets in this plant...">
            </div>

            <div class="asset-type-scroller">
                <button class="type-pill active">All</button>
                <button class="type-pill">Boiler</button>
                <button class="type-pill">Pump</button>
                <button class="type-pill">Valve</button>
                <button class="type-pill">Trap</button>
                <button class="type-pill">Meter</button>
            </div>

            <div class="form-card asset-form">
                <h3>Capture Asset</h3>
                <div class="camera-box">
                    <input type="file" id="asset-photo" accept="image/jpeg" capture="environment">
                    <label for="asset-photo" class="camera-label">
                        <span>📷 Tap to Take Photo</span>
                    </label>
                </div>
                
                <div class="gps-box">
                    <button id="btn-get-gps" class="outline-btn">📍 Tag Location</button>
                    <span id="gps-coords">No GPS Data</span>
                </div>

                <button id="btn-save-asset" class="primary-btn">Save Asset</button>
            </div>

            <div id="asset-gallery" class="gallery-list">
                </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
