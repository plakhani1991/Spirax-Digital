<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Field Asset Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header" id="main-header" style="display:none;">
        <div class="header-content">
            <h1>Spirax Drive</h1>
            <button id="btn-logout" class="icon-btn outline-btn" style="color: white; border-color: white; padding: 0.4rem 0.8rem;">Logout</button>
        </div>
        <div id="sync-container" style="display: none; margin-top: 5px;">
            <div class="progress-bg">
                <div id="sync-bar" class="progress-fill"></div>
            </div>
            <p id="sync-text" style="font-size: 0.75rem; margin: 3px 0 0 0; text-align: center;">Syncing...</p>
        </div>
    </header>

    <main id="app-container">
        <section id="view-form-steam-insight" class="view">
    <div class="form-container">
        <div class="form-header">
            <button class="nav-assets icon-btn">⬅️</button>
            <h2 id="steam-form-title">Steam Insight</h2>
        </div>

        <input type="hidden" class="asset-id">
        <input type="hidden" class="asset-type" value="steam-insight">

        <div class="form-group">
            <label>Asset Sub-Type</label>
            <select class="asset-sub-type" onchange="window.toggleSteamFields(this)">
                <option value="">-- Select Option --</option>
                <option value="Safety Valve">1. Safety Valve</option>
                <option value="Blocked Steam Trap">2. Blocked Steam Trap</option>
                <option value="PRV">3. PRV</option>
                <option value="Overflow">4. Overflow</option>
                <option value="APT">5. APT</option>
                <option value="Other">6. Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Asset Name</label>
            <input type="text" class="asset-name" placeholder="e.g. Boiler House PRV 01">
        </div>

        <div class="form-group">
            <label>GPS Location</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="outline-btn" onclick="window.recordPreciseGPS(this)" style="flex:1">📍 Record Precise</button>
                <span class="gps-display" style="font-size: 0.75rem; color: #64748b; flex:1">No GPS data</span>
                <input type="hidden" class="asset-gps-lat">
                <input type="hidden" class="asset-gps-lng">
            </div>
        </div>

        <div class="form-group">
            <label>Steam Pressure (barg)</label>
            <input type="number" step="0.1" class="asset-pressure" placeholder="0.0">
        </div>

        <div id="steam-dn-container" class="form-group" style="display:none;">
            <label>Safety Valve DN Size (e.g. 25/40)</label>
            <input type="text" class="asset-dn-size" placeholder="25/40">
        </div>

        <div id="steam-set-pressure-container" class="form-group" style="display:none;">
            <label>Set Pressure (barg)</label>
            <input type="number" step="0.1" class="asset-set-pressure" placeholder="0.0">
        </div>

        <div class="form-group">
            <label>Additional Notes</label>
            <textarea class="asset-notes" rows="3" placeholder="Any observation..."></textarea>
        </div>

        <div class="form-group">
            <label>Photos</label>
            <input type="file" class="asset-photo-input" accept="image/*" multiple style="display:none">
            <button class="btn-trigger-camera outline-btn" style="width:100%">📷 Take/Add Photos</button>
            <div class="image-preview-gallery"></div>
        </div>

        <button class="primary-btn btn-save-asset" style="margin-top:1.5rem">Save Asset Locally</button>
    </div>
</section>
        <section id="view-login" class="view active">
            <div class="login-card">
                <div class="logo-area" style="font-size: 3rem; text-align: center;">🏢</div>
                <h2 style="text-align: center;">Welcome Back</h2>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address">
                    <input type="password" id="password" placeholder="Password">
                </div>
                <button id="btn-login" class="primary-btn">Sign In</button>
            </div>
        </section>

        <section id="view-home" class="view">
            <div class="section-header">
                <h2>Dashboard</h2>
            </div>
            <button id="nav-create-site" class="primary-btn" style="margin-bottom: 1rem;">+ Create New Local Site</button>
            <button id="nav-sync-sites" class="secondary-btn" style="width: 100%; margin-bottom: 2rem;">☁️ Sync Existing Site</button>
            
            <h3>Local Offline Sites</h3>
            <ul id="local-site-list" class="styled-list"></ul>
        </section>

        <section id="view-create-site" class="view">
            <button class="back-link outline-btn nav-home" style="margin-bottom: 1rem;">← Cancel</button>
            <div class="form-card">
                <h3>New Local Site</h3>
                <input type="text" id="new-site-name" placeholder="Site Name">
                <input type="text" id="new-site-city" placeholder="City">
                <button id="btn-save-new-site" class="primary-btn">Save & Continue</button>
            </div>
        </section>

        <section id="view-sync-sites" class="view">
            <button class="back-link outline-btn nav-home" style="margin-bottom: 1rem;">← Back to Home</button>
            <div class="section-header">
                <h2>Cloud Sites</h2>
            </div>
            <ul id="cloud-site-list" class="styled-list"></ul>
        </section>

        <section id="view-plants" class="view">
            <button class="back-link outline-btn nav-home" style="margin-bottom: 1rem;">← Home</button>
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 id="current-site-title" style="margin: 0;">Plants</h2>
                    <p id="current-site-city" style="margin: 0; color: #64748b;"></p>
                </div>
                <button id="btn-push-cloud" class="badge-btn" style="background: #10b981; color: white;">☁️ Push</button>
            </div>

            <div class="form-card">
                <input type="text" id="new-plant-name" placeholder="New Plant Name">
                <button id="btn-add-plant" class="secondary-btn">+ Add Plant</button>
            </div>
            <div id="plant-gallery" class="gallery-grid"></div>
        </section>

        <section id="view-assets" class="view">
            <button id="btn-back-to-plants" class="back-link outline-btn" style="margin-bottom: 1rem;">← Back to Plants</button>
            <div class="section-header">
                <h2 id="current-plant-title">Plant Assets</h2>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1.5rem;">
                <button class="primary-btn btn-add-specific" data-type="Steam Insight">+ Steam Insight</button>
                <button class="primary-btn btn-add-specific" data-type="Flow Meter">+ Flow Meter</button>
                <button class="primary-btn btn-add-specific" data-type="CCD">+ CCD</button>
                <button class="primary-btn btn-add-specific" data-type="DCC">+ DCC</button>
            </div>
            <div id="asset-gallery" class="gallery-list"></div>
        </section>

        <section id="view-form-Steam-Insight" class="view asset-form-view">
            <button class="back-link outline-btn btn-cancel-asset" style="margin-bottom: 1rem;">← Cancel</button>
            <div class="form-card asset-form">
                <h3 class="form-title">Steam Insight Details</h3>
                <input type="hidden" class="asset-id">
                <input type="hidden" class="asset-type" value="Steam Insight">
                <div class="input-group">
                    <input type="text" class="asset-name" placeholder="Asset Name">
                    <input type="text" class="asset-model" placeholder="Model / Serial Number">
                    <select class="asset-condition">
                        <option value="">Select Condition</option>
                        <option value="New">New</option><option value="Good">Good</option><option value="Fair">Fair</option><option value="Action Required">Action Required</option>
                    </select>
                    <input type="text" class="specific-field-1" placeholder="Max Operating Pressure (Bar)">
                    <textarea class="asset-notes" placeholder="Additional Notes" rows="3"></textarea>
                </div>
                <div class="camera-ui">
                    <input type="file" class="asset-photo-input" accept="image/jpeg" capture="environment" multiple>
                    <button class="outline-btn btn-trigger-camera" style="width: 100%; margin-bottom: 0.5rem;">📷 Take / Select Photos</button>
                    <div class="image-preview-gallery" style="display:flex; gap:0.5rem; overflow-x:auto; padding-bottom: 0.5rem;"></div>
                </div>
                <button class="primary-btn btn-save-asset" style="margin-top: 1rem;">Save Asset</button>
            </div>
        </section>

        <section id="view-form-Flow-Meter" class="view asset-form-view">
            <button class="back-link outline-btn btn-cancel-asset" style="margin-bottom: 1rem;">← Cancel</button>
            <div class="form-card asset-form">
                <h3 class="form-title">Flow Meter Details</h3>
                <input type="hidden" class="asset-id">
                <input type="hidden" class="asset-type" value="Flow Meter">
                <div class="input-group">
                    <input type="text" class="asset-name" placeholder="Asset Name">
                    <input type="text" class="asset-model" placeholder="Model / Serial Number">
                    <select class="asset-condition">
                        <option value="">Select Condition</option>
                        <option value="New">New</option><option value="Good">Good</option><option value="Fair">Fair</option><option value="Action Required">Action Required</option>
                    </select>
                    <input type="text" class="specific-field-1" placeholder="Pipe Size (mm)">
                    <textarea class="asset-notes" placeholder="Additional Notes" rows="3"></textarea>
                </div>
                <div class="camera-ui">
                    <input type="file" class="asset-photo-input" accept="image/jpeg" capture="environment" multiple>
                    <button class="outline-btn btn-trigger-camera" style="width: 100%; margin-bottom: 0.5rem;">📷 Take / Select Photos</button>
                    <div class="image-preview-gallery" style="display:flex; gap:0.5rem; overflow-x:auto; padding-bottom: 0.5rem;"></div>
                </div>
                <button class="primary-btn btn-save-asset" style="margin-top: 1rem;">Save Asset</button>
            </div>
        </section>

        <section id="view-form-CCD" class="view asset-form-view">
            <button class="back-link outline-btn btn-cancel-asset" style="margin-bottom: 1rem;">← Cancel</button>
            <div class="form-card asset-form">
                <h3 class="form-title">CCD Details</h3>
                <input type="hidden" class="asset-id">
                <input type="hidden" class="asset-type" value="CCD">
                <div class="input-group">
                    <input type="text" class="asset-name" placeholder="Asset Name">
                    <input type="text" class="asset-model" placeholder="Model / Serial Number">
                    <select class="asset-condition">
                        <option value="">Select Condition</option>
                        <option value="New">New</option><option value="Good">Good</option><option value="Fair">Fair</option><option value="Action Required">Action Required</option>
                    </select>
                    <input type="text" class="specific-field-1" placeholder="Condensate Load (kg/hr)">
                    <textarea class="asset-notes" placeholder="Additional Notes" rows="3"></textarea>
                </div>
                <div class="camera-ui">
                    <input type="file" class="asset-photo-input" accept="image/jpeg" capture="environment" multiple>
                    <button class="outline-btn btn-trigger-camera" style="width: 100%; margin-bottom: 0.5rem;">📷 Take / Select Photos</button>
                    <div class="image-preview-gallery" style="display:flex; gap:0.5rem; overflow-x:auto; padding-bottom: 0.5rem;"></div>
                </div>
                <button class="primary-btn btn-save-asset" style="margin-top: 1rem;">Save Asset</button>
            </div>
        </section>

        <section id="view-form-DCC" class="view asset-form-view">
            <button class="back-link outline-btn btn-cancel-asset" style="margin-bottom: 1rem;">← Cancel</button>
            <div class="form-card asset-form">
                <h3 class="form-title">DCC Details</h3>
                <input type="hidden" class="asset-id">
                <input type="hidden" class="asset-type" value="DCC">
                <div class="input-group">
                    <input type="text" class="asset-name" placeholder="Asset Name">
                    <input type="text" class="asset-model" placeholder="Model / Serial Number">
                    <select class="asset-condition">
                        <option value="">Select Condition</option>
                        <option value="New">New</option><option value="Good">Good</option><option value="Fair">Fair</option><option value="Action Required">Action Required</option>
                    </select>
                    <input type="text" class="specific-field-1" placeholder="Valve Type">
                    <textarea class="asset-notes" placeholder="Additional Notes" rows="3"></textarea>
                </div>
                <div class="camera-ui">
                    <input type="file" class="asset-photo-input" accept="image/jpeg" capture="environment" multiple>
                    <button class="outline-btn btn-trigger-camera" style="width: 100%; margin-bottom: 0.5rem;">📷 Take / Select Photos</button>
                    <div class="image-preview-gallery" style="display:flex; gap:0.5rem; overflow-x:auto; padding-bottom: 0.5rem;"></div>
                </div>
                <button class="primary-btn btn-save-asset" style="margin-top: 1rem;">Save Asset</button>
            </div>
        </section>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
